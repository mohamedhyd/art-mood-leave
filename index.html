function geoDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const LATE_GRACE = 90; 
const WORK_HOURS = 8;
const WORK_START = "09:00";

const LATE_AFTER = 9 * 60 + 30;     
const ABSENT_AFTER = 10 * 60 + 30;  
const EARLY_LEAVE_BEFORE = 16 * 60; 
function toMins(t) { if (!t) return null; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function dayStatus(inTime, outTime, shiftKey) {
  if (!inTime) return "absent"; 
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return "present"; 
  const inM = toMins(inTime);
  if (inM >= ABSENT_AFTER) return "absent";          
  if (outTime && toMins(outTime) < EARLY_LEAVE_BEFORE) return "absent"; 
  if (inM >= LATE_AFTER) return "late";              
  return "present";                                  
}

function isLateForShift(time, shiftKey) {
  if (!time) return false;
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return false; 
  const [ih, im] = time.split(":").map(Number);
  const checkInMins = ih * 60 + im;
  return checkInMins > LATE_AFTER;
}

function calcOvertime(hours, dateStr, shiftKey) {
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  const standardHours = shift ? shift.hours : 8;
  const ot = hours - standardHours;
  return { overtime: ot > 0 ? ot : 0 };
}

/* UNIVERSAL LIGHTWEIGHT CAMERA WIDGET */
function SelfieWidget({ onCapture, empName }) {
  const fileRef = useRef(null);
  const canvasRef = useRef(null);
  const [prev, setPrev] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if (fileRef.current) {
      fileRef.current.click();
    }
  }, []);

  function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setLoading(true);
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = canvasRef.current;
        if (!canvas) {
          setPrev(ev.target.result); setLoading(false); onCapture(ev.target.result); return;
        }
        canvas.width = 500; canvas.height = 500;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, 500, 500);
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, 455, 500, 45);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 13px Cairo, Arial, sans-serif"; ctx.textAlign = "right";
        ctx.fillText(`بصمة حية موثقة: ${empName || ""} | التوقيت: ${new Date().toLocaleString("ar-EG")}`, 485, 482);
        const stampedUrl = canvas.toDataURL("image/jpeg", 0.65);
        setPrev(stampedUrl); setLoading(false); onCapture(stampedUrl);
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  }

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 12, width: "100%" } },
    React.createElement("input", { ref: fileRef, type: "file", accept: "image/*", capture: "user", style: { display: "none" }, onChange: handleFile }),

function EmpDashboardWidget({ emp, recs, leaves }) {
  if (!emp) return null;
  const [range, setRange] = useState("month");
  const [reportDate, setReportDate] = useState(todayStr());

  const baseDate = new Date(reportDate + "T00:00:00");
  const cutoff = new Date(baseDate);
  if (range === "week") cutoff.setDate(baseDate.getDate() - 7);
  else if (range === "month") cutoff.setMonth(baseDate.getMonth() - 1);
  else if (range === "3month") cutoff.setMonth(baseDate.getMonth() - 3);
  else cutoff.setFullYear(baseDate.getFullYear() - 1);
  const cutoffStr = cutoff.toISOString().split("T")[0];

  const periodRecs = recs.filter(r => {
    if (range === "day") return r.date === reportDate;
    return r.date >= cutoffStr && r.date <= reportDate;
  });

  const myRecs = periodRecs.filter(r => r.empId === emp.id);
  const byDate = {};
  myRecs.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = { in: null, out: null };

/* MANAGEMENT CONTROLLER PANEL */
function AttendDash({ emps, recs, leaves, isSuper, depts }) {
  const today = todayStr();
  const todayR = recs.filter(r => r.date === today);
  
  function st(id) {
    if (leaves?.some(l => l.empId === id && l.date === today && l.status === "approved")) return "leave";
    const rs = todayR.filter(x => x.empId === id);
    return rs.length ? (rs[rs.length - 1].type === "in" ? "in" : "done") : "absent";
  }

  return React.createElement("div", { style: { padding: "14px 0" } },
    React.createElement(Card, { title: "لوحة المراقبة الفورية لليوم" },
      emps.map(e => React.createElement("div", { key: e.id, style: { padding: 8, borderBottom: `1px solid ${T.border}` } }, `${e.name} - الحضور: ${st(e.id)}`))

}

async function getDeviceFP() {
  const p = [navigator.userAgent, navigator.language, screen.width + "x" + screen.height].join("|");
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("").slice(0, 16);
}
