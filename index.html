function geoDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            React.createElement("div", null) && Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const LATE_GRACE = 90; 
const WORK_HOURS = 8;
const WORK_START = "09:00";

const LATE_AFTER = 9 * 60 + 30;     // 09:30
const ABSENT_AFTER = 10 * 60 + 30;  // 10:30
const EARLY_LEAVE_BEFORE = 16 * 60; // 16:00
function toMins(t) { if (!t) return null; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function dayStatus(inTime, outTime, shiftKey, dateStr, holidays = [], missions = [], empId = "") {
  if (holidays && holidays.some(h => h.date === dateStr)) return "holiday";
  if (missions && missions.some(m => m.empId === empId && m.date === dateStr && m.status === "approved")) return "mission";
  if (!inTime) return "absent"; 
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return "present"; 
  const inM = toMins(inTime);
  if (inM >= ABSENT_AFTER) return "absent";          
  if (outTime && toMins(outTime) < EARLY_LEAVE_BEFORE && !shift?.isFlexible) return "absent"; 
  if (inM >= LATE_AFTER) return "late";              
  return "present";                                  
}

function isLateForShift(time, shiftKey) {
  if (!time) return false;
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return false; 
  const [ih, im] = time.split(":").map(Number);
  const checkInMins = ih * 60 + im;
  return checkInMins > LATE_AFTER;
}

function isWorkDay(dateStr) {
  const day = new Date(dateStr).getDay();
  return WORK_DAYS.includes(day);
}

function isSaturday(dateStr) {
  return new Date(dateStr).getDay() === SATURDAY;
}

function calcOvertime(hours, dateStr, shiftKey) {
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (isSaturday(dateStr)) {
    return { regular: 0, overtime: hours, saturdayOT: hours };
  }
  if (isWorkDay(dateStr)) {
    const extra = Math.max(0, hours - (shift ? shift.hours : 8));
    return { regular: Math.min(hours, (shift ? shift.hours : 8)), overtime: extra, saturdayOT: 0 };
  }
  return { regular: 0, overtime: hours, saturdayOT: 0 };
}

function SelfieWidget({ onCapture, empName }) {
  const fileRef = useRef(null);

        ctx.drawImage(img, 0, 0, width, height);
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, height - 45, width, 45);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 13px Cairo, Arial, sans-serif"; ctx.textAlign = "right";

        const stampedUrl = c.toDataURL("image/jpeg", 0.85);
        setPrev(stampedUrl); setLoading(false); onCapture(stampedUrl);
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  }

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 12, width: "100%" } },

    prev ? React.createElement("div", { style: { position: "relative", display: "inline-block" } },

/* EMPLOYEE LIVE STATISTICS WIDGET */
function EmpDashboardWidget({ emp, recs, leaves, holidays = [], missions = [] }) {
  if (!emp) return null;
  const [range, setRange] = useState("month");
  const [reportDate, setReportDate] = useState(todayStr());

  const baseDate = new Date(reportDate + "T00:00:00");
  const cutoff = new Date(baseDate);
  if (range === "week") cutoff.setDate(baseDate.getDate() - 7);
  else if (range === "month") cutoff.setMonth(baseDate.getMonth() - 1);
  else if (range === "3month") cutoff.setMonth(baseDate.getMonth() - 3);
  const cutoffStr = cutoff.toISOString().split("T")[0];

  const periodRecs = recs.filter(r => range === "day" ? r.date === reportDate : r.date >= cutoffStr && r.date <= reportDate);
  const myRecs = periodRecs.filter(r => r.empId === emp.id);
  const byDate = {};
  myRecs.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = { in: null, out: null };
    if (r.type === "in" && !byDate[r.date].in) byDate[r.date].in = r.time;
    if (r.type === "out") byDate[r.date].out = r.time;
  });
  
  let present = 0, late = 0, absent = 0, early = 0, totalMins = 0;
  const empShift = emp.shift || "9-5";
  Object.entries(byDate).forEach(([dateStr, d]) => {
    const s = dayStatus(d.in, d.out, empShift, dateStr, holidays, missions, emp.id);
    if (s === "present") present++;
    else if (s === "late") late++;
    else if (s === "absent") absent++;
    if (d.in && d.out) { const diff = toMins(d.out) - toMins(d.in); if (diff > 0) totalMins += diff; }
  });
  
  const approvedLeaves = leaves?.filter(l => l.empId === emp.id && l.date >= cutoffStr && l.date <= reportDate && l.status === "approved") || [];
  const leaveDays = approvedLeaves.length;

  let checkInTime = "—", checkOutTime = "—", dayStatusLabel = "غائب", statusColor = T.danger, statusBg = T.dLight;
  const specificIn = myRecs.find(x => x.date === reportDate && x.type === "in")?.time;
  const specificOut = myRecs.find(x => x.date === reportDate && x.type === "out")?.time;
  if (specificIn) checkInTime = specificIn; if (specificOut) checkOutTime = specificOut;

  const currentStatus = dayStatus(specificIn, specificOut, empShift, reportDate, holidays, missions, emp.id);
  const dayLeave = leaves?.find(l => l.empId === emp.id && l.date === reportDate && l.status === "approved");
  const dayHoliday = holidays?.find(h => h.date === reportDate);
  const dayMission = missions?.find(m => m.empId === emp.id && m.date === reportDate && m.status === "approved");
  
  if (dayHoliday) { dayStatusLabel = `إجازة رسمية (${dayHoliday.label})`; statusColor = T.gold; statusBg = T.gLight; }
  else if (dayMission) { dayStatusLabel = `مأمورية (${dayMission.destination})`; statusColor = T.accent; statusBg = T.aLight; }
  else if (dayLeave) { dayStatusLabel = `إجازة (${dayLeave.type})`; statusColor = T.gold; statusBg = T.gLight; }
  else if (currentStatus === "present") { dayStatusLabel = "حاضر"; statusColor = T.ok; statusBg = T.oLight; }
  else if (currentStatus === "late") { dayStatusLabel = "متأخر"; statusColor = T.warn; statusBg = T.wLight; }

  return React.createElement("div", {
    style: { background: "#FFFFFF", border: "1.5px solid #6366F1", borderRadius: 18, padding: 18, marginTop: 14, width: "100%", maxWidth: 420, textAlign: "right", boxShadow: T.shM }
  },
    React.createElement("div", { style: { fontWeight: 700, fontSize: 14, color: "#6366F1", marginBottom: 12, borderBottom: "1px solid #E4E8F0", paddingBottom: 8 } }, "📊 تقاريرك الشخصية الحالية والسحابية"),
    React.createElement("div", { style: { display: "flex", gap: 4, marginBottom: 12 } },
      [ { id: "day", l: "اليوم" }, { id: "week", l: "أسبوع" }, { id: "month", l: "شهر" } ].map(r => React.createElement("button", {
        key: r.id, onClick: () => setRange(r.id),
        style: { padding: "6px 12px", background: range === r.id ? T.accent : T.hi, color: range === r.id ? "#fff" : T.txt, borderRadius: 8, fontSize: 11 }
      }, r.l))
    ),
    React.createElement("div", { style: { background: T.bg, padding: 10, borderRadius: 12, fontSize: 11 } },
      range === "day" ? `موقف اليوم: ${dayStatusLabel} | حضور: ${checkInTime} | انصراف: ${checkOutTime}` : `أيام التواجد: ${present} | تأخير: ${late} | غياب: ${absent} | إجازات: ${leaveDays}`
    )
  );
}

/* MAIN KIOSK VIEW */
function Kiosk({ emps, managers, recs, onRec, onNavigateToLogin, depts, onLeaveRequest, onMissionRequest, leaves, holidays, missions }) {
  const [step, setStep] = useState("pin");
  const [emp, setEmp] = useState(null);
  const [act, setAct] = useState("");
  const [gps, setGps] = useState(null);
  const [selfie, setSelfie] = useState(null);
  const [err, setErr] = useState("");
  const [sk, setSk] = useState(0);

  const today = todayStr();
  function empSt(id) {
    const rs = recs.filter(r => r.date === today && r.empId === id);
    return rs.length ? (rs[rs.length - 1].type === "in" ? "in" : "done") : "absent";
  }

  function onPin(pin) {
    let e = emps.find(x => x.pin === pin);
    if (!e) {
      const mg = managers.find(x => x.pin === pin);
      if (mg) e = { id: mg.id, name: mg.name, dept: "الإدارة", pin: mg.pin, color: mg.color, shift: mg.shift || DEFAULT_SHIFT };
    }
    if (!e) { setErr("رمز التحقق الشخصي PIN غير صحيح"); setSk(k => k + 1); return; }
    setEmp(e);
    setAct(empSt(e.id) === "in" ? "out" : "in");
    setStep("gps");
  }

  function doRec() {
    const time = nowStr();
    onRec({
      empId: emp.id, empName: emp.name, dept: emp.dept, date: today, time: time, type: act,
      late: act === "in" ? isLate(time, getShiftForEmp(emp)) : false, lat: gps?.lat || null, lng: gps?.lng || null,
      inZone: true, selfieUrl: selfie || null, deviceVerified: true
    });
    setStep("success");
    setTimeout(() => { setStep("pin"); setEmp(null); setGps(null); setSelfie(null); }, 3000);
  }

  if (step === "success") {
    return React.createElement(CenteredPage, null,
      React.createElement(IcoBox, { icon: "✓", bg: T.oLight, sz: 80 }),
      React.createElement("div", { style: { fontSize: 22, fontWeight: 700 } }, "تم تسجيل حركتك بنجاح برقمك السري"),
      React.createElement("div", { className: "mono", style: { fontSize: 40, fontWeight: 700, color: T.accent } }, nowStr())
    );
  }

  if (["gps", "selfie", "confirm"].includes(step)) {
    return React.createElement("div", { style: { minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", alignItems: "center", padding: "20px", gap: 14 } },
      React.createElement(StepBar, { cur: step === "gps" ? 0 : step === "selfie" ? 1 : 2, steps: ["الموقع", "الصورة", "تأكيد"] }),
      step === "gps" && React.createElement("div", { style: { width: "100%", maxWidth: 400 } },
        React.createElement(GpsWidget, { onResult: setGps }),
        React.createElement("button", { onClick: () => setStep("selfie"), style: { padding: 14, background: T.accent, color: "#fff", width: "100%", marginTop: 10, fontWeight: 700 } }, "الانتقال للكاميرا والتقاط اللقطة")
      ),
      step === "selfie" && React.createElement(SelfieWidget, { empName: emp?.name, onCapture: (url) => { setSelfie(url); setStep("confirm"); } }),
      step === "confirm" && React.createElement("button", { onClick: doRec, style: { padding: 14, background: T.ok, color: "#fff", width: "100%", maxWidth: 400, fontWeight: 700 } }, "تأكيد وإرسال بصمة العمل سحابياً"),
      React.createElement(EmpDashboardWidget, { emp, recs, leaves, holidays, missions }),
      React.createElement("button", { onClick: () => onLeaveRequest(emp), style: { padding: 10, background: T.wLight, color: T.warn, width: "100%", maxWidth: 400, marginTop: 10 } }, "تقديم طلب إجازة طارئة"),
      React.createElement("button", { onClick: () => onMissionRequest(emp), style: { padding: 10, background: T.aLight, color: T.accent, width: "100%", maxWidth: 400, marginTop: 6, fontWeight: 'bold' } }, "💼 تسجيل مأمورية خارجية (برة المصنع)")
    );
  }

  return React.createElement(CenteredPage, null,
    React.createElement(Logo, { width: 140 }),
    React.createElement(LiveClock, null),
    err && React.createElement(Note, { color: T.danger, bg: T.dLight }, err),

}

/* SETTINGS VIEW EXTENDED FOR HOLIDAYS AND MODES FOR ALL MANAGERS */
function Settings({ kioskMode, setKioskMode, setRecs, depts, setDepts, isSuper, holidays, setHolidays }) {
  const [newDept, setNewDept] = useState("");
  const [hForm, setHForm] = useState({ date: todayStr(), label: "" });

  function handleAddHoliday() {
    if (!hForm.label.trim()) return;
    const newH = { id: String(Date.now()), date: hForm.date, label: hForm.label.trim() };
    setHolidays(h => [...h, newH]);
    if (window._fbDB) window._fbFirestore.setDoc(window._fbFirestore.doc(window._fbDB, "holidays", newH.id), newH);
    setHForm({ date: todayStr(), label: "" });
  }

  function handleDeleteHoliday(id) {
    setHolidays(h => h.filter(x => x.id !== id));
    if (window._fbDB) window._fbFirestore.deleteDoc(window._fbFirestore.doc(window._fbDB, "holidays", id));
  }

  return React.createElement("div", { style: { padding: "20px 0", display: "flex", flexDirection: "column", gap: 14, maxWidth: 520 } },
    React.createElement(Card, { title: "🔄 التحكم في وضع تشغيل النظام الفوري" },
      React.createElement("div", { style: { fontSize: 12, color: T.muted, marginBottom: 10 } }, "تغيير نمط الجهاز الحالي من لوحتك:"),
      React.createElement("div", { style: { display: "flex", gap: 10 } },
        [{ v: "personal", l: "وضع الهاتف الشخصي للموظفين" }, { v: "tablet", l: "وضع تابلت البوابة الموحد" }].map(o => React.createElement("button", {
          key: o.v, onClick: () => setKioskMode(o.v),
          style: { flex: 1, padding: 12, background: kioskMode === o.v ? T.aLight : T.hi, color: kioskMode === o.v ? T.accent : T.txt, fontWeight: "bold", borderRadius: 10 }
        }, o.l))
      )
    ),
    React.createElement(Card, { title: "📅 إضافة خيار يوم إجازة رسمية (للجميع دفعة واحدة)" },
      React.createElement("input", { type: "date", value: hForm.date, onChange: e => setHForm({ ...hForm, date: e.target.value }) }),
      React.createElement("input", { placeholder: "اسم المناسبة (مثال: عيد ثورة 23 يوليو)...", value: hForm.label, onChange: e => setHForm({ ...hForm, label: e.target.value }), style: { marginTop: 8 } }),
      React.createElement("button", { onClick: handleAddHoliday, style: { background: T.ok, color: "#fff", padding: 10, marginTop: 8, width: "100%" } }, "إعلان وإضافة إجازة رسمية شاملة"),
      React.createElement("div", { style: { marginTop: 10, display: "flex", gap: 5, flexWrap: "wrap" } },
        holidays && holidays.map(h => React.createElement("span", { key: h.id, style: { background: T.gLight, color: T.gold, padding: "4px 8px", borderRadius: 12, fontSize: 11 } }, 
          `${h.date}: ${h.label} `, React.createElement("b", { onClick: () => handleDeleteHoliday(h.id), style: { color: T.danger, cursor: "pointer" } }, "×")
        ))
      )
    ),
    isSuper && React.createElement(Card, { title: "إدارة صيانة البيانات المتقدمة" },
      React.createElement("button", { onClick: () => confirm("تصفير السجلات؟") && setRecs([]), style: { background: T.dLight, color: T.danger, padding: 10, width: "100%" } }, "مسح وتصفير كافة سجلات الحضور")
    )
  );
}

/* MANAGER CONTROLLER PANEL */
function AttendDash({ emps, recs, leaves, isSuper, depts, holidays = [], missions = [] }) {
  const today = todayStr();
  function st(id) {
    if (holidays.some(h => h.date === today)) return "holiday";
    if (missions.some(m => m.empId === id && m.date === today && m.status === "approved")) return "mission";
    if (leaves?.some(l => l.empId === id && l.date === today && l.status === "approved")) return "leave";
    const rs = recs.filter(r => r.date === today && r.empId === id);
    return rs.length ? (rs[rs.length - 1].type === "in" ? "in" : "done") : "absent";
  }
  
  const present = emps.filter(e => st(e.id) === "in");
  const missionEmps = emps.filter(e => st(e.id) === "mission");

  return React.createElement("div", { style: { padding: "20px 0" } },
    React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 15 } },
      React.createElement("div", { style: { background: T.oLight, padding: 14, borderRadius: 12 } }, `متواجد بالعمل: ${present.length}`),
      React.createElement("div", { style: { background: T.aLight, padding: 14, borderRadius: 12 } }, `في مأمورية: ${missionEmps.length}`),
      React.createElement("div", { style: { background: T.gLight, padding: 14, borderRadius: 12 } }, `إجمالي القوة: ${emps.length}`)
    ),
    React.createElement(Card, { title: "كشف الحالة الحركية الفورية اليوم" },
      emps.map(e => {
        const s = st(e.id);
        const labels = { in: "في العمل", done: "انصرف", absent: "غائب", leave: "إجازة معتمدة", holiday: "إجازة رسمية عمومیة", mission: "💼 مأمورية خارجية برة" };
        return React.createElement("div", { key: e.id, style: { padding: 10, borderBottom: "1px solid #eee", display: "flex", justifyContent: "space-between" } },
          React.createElement("span", null, e.name),
          React.createElement("b", null, labels[s] || "غائب")
        );
      })
    )
  );
}

function Reports({ emps, recs, depts, leaves, holidays = [], missions = [] }) {
  const [reportDate, setReportDate] = useState(todayStr());
  return React.createElement("div", { style: { padding: "20px 0" } },
    React.createElement("input", { type: "date", value: reportDate, onChange: e => setReportDate(e.target.value) }),
    React.createElement("div", { style: { marginTop: 15 } },
      emps.map(e => {
        const dayData = recs.filter(x => x.date === reportDate && x.empId === e.id);
        const specificIn = dayData.find(x => x.type === "in")?.time || "—";
        const specificOut = dayData.find(x => x.type === "out")?.time || "—";
        const isH = holidays.some(h => h.date === reportDate);
        const isM = missions.some(m => m.empId === e.id && m.date === reportDate && m.status === "approved");
        return React.createElement("div", { key: e.id, style: { padding: 10, background: "#fff", marginBottom: 5, borderRadius: 8 } },
          `${e.name} | الحضور: ${specificIn} | الانصراف: ${specificOut} | الوضع: ${isH ? "إجازة رسمية" : isM ? "مأمورية خارجي" : "يوم طبيعي"}`
        );
      })
    )
  );
}

function MgrPanel({ mgr, allEmps, setAllEmps, recs, setRecs, leaves, setLeaves, managers, setManagers, kioskMode, setKioskMode, depts, setDepts, holidays, setHolidays, missions, setMissions, onExit }) {

  return React.createElement("div", { style: { minHeight: "100vh", background: T.bg } },
    React.createElement("div", { style: { background: "#fff", padding: 15, display: "flex", justifyContent: "space-between", borderBottom: "1px solid #ddd" } },
      React.createElement("span", null, `مرحباً: ${mgr.name} | لوحة تحكم سحابية`),
      React.createElement("button", { onClick: onExit, style: { background: T.danger, color: "#fff", padding: "5px 12px" } }, "خروج")
    ),
    React.createElement("div", { style: { display: "flex", background: "#fff", overflowX: "auto" } },
      TABS.map(t => React.createElement("button", { key: t.id, onClick: () => setTab(t.id), style: { padding: 12, borderBottom: tab === t.id ? `3px solid ${T.accent}` : "none", color: tab === t.id ? T.accent : T.muted } }, t.l))
    ),
    React.createElement("div", { style: { padding: 20 } },
      tab === "dash" && React.createElement(AttendDash, { emps: visEmps, recs, leaves, isSuper, depts, holidays, missions }),
      tab === "rep" && React.createElement(Reports, { emps: visEmps, recs, depts, leaves, holidays, missions }),
      tab === "leave" && React.createElement(Leaves, { emps: visEmps, leaves, setLeaves, managers, depts, mgr, missions, setMissions }),
      tab === "sett" && React.createElement(Settings, { kioskMode, setKioskMode, setRecs, depts, setDepts, isSuper, holidays, setHolidays })
    )
  );
}

/* ROOT APP APPLICATION */
function App() {
  const [emps, setEmps] = useLS("a9_emps", []);
  const [recs, setRecs] = useLS("a9_recs", []);
  const [leaves, setLeaves] = useLS("a9_leaves", []);
  const [managers, setManagers] = useLS("a9_mgrs", DEF_MGRS);
  const [kioskMode, setKioskMode] = useLS("a9_kioskmode", "personal");
  const [holidays, setHolidays] = useLS("a9_holidays", []);
  const [missions, setMissions] = useLS("a9_missions", []);
  const [depts, setDepts] = useLS("a9_depts", [
    { name: "الإدارة", color: "#6366F1" }, { name: "الإنتاج", color: "#10B981" }
  ]);
  const [view, setView] = useState("kiosk");
  const [curMgr, setCurMgr] = useState(null);
  const [preAuthEmp, setPreAuthEmp] = useState(null);

  useEffect(() => {
    if (!window._fbDB) return;
    const db = window._fbDB; const { collection, onSnapshot } = window._fbFirestore;
    onSnapshot(collection(db, "employees"), (snap) => { const d = snap.docs.map(x => Object.assign({ id: x.id }, x.data())); if(d.length) setEmps(d); });
    onSnapshot(collection(db, "records"), (snap) => { const d = snap.docs.map(x => Object.assign({ id: x.id }, x.data())); if(d.length) setRecs(d); });
    onSnapshot(collection(db, "leaves"), (snap) => { const d = snap.docs.map(x => Object.assign({ id: x.id }, x.data())); if(d.length) setLeaves(d); });
    onSnapshot(collection(db, "managers"), (snap) => { const d = snap.docs.map(x => Object.assign({ id: x.id }, x.data())); if(d.length) setManagers(d); });
    onSnapshot(collection(db, "holidays"), (snap) => { const d = snap.docs.map(x => Object.assign({ id: x.id }, x.data())); if(d.length) setHolidays(d); });
    onSnapshot(collection(db, "missions"), (snap) => { const d = snap.docs.map(x => Object.assign({ id: x.id }, x.data())); if(d.length) setMissions(d); });
  }, []);

  return React.createElement(React.Fragment, null,
    React.createElement("style", null, CSS),
    view === "kiosk" && kioskMode === "personal" && React.createElement(Kiosk, { emps, managers, recs, onRec: (r) => { setRecs(p => [...p, r]); if(window._fbDB) window._fbFirestore.addDoc(window._fbFirestore.collection(window._fbDB, "records"), r); }, onNavigateToLogin: () => setView("login"), depts, onLeaveRequest: (e) => { setPreAuthEmp(e); setView("leave_req"); }, onMissionRequest: (e) => { setPreAuthEmp(e); setView("mission_req"); }, leaves, holidays, missions }),
    view === "kiosk" && kioskMode === "tablet" && React.createElement(KioskTablet, { emps, managers, recs, onRec: (r) => { setRecs(p => [...p, r]); if(window._fbDB) window._fbFirestore.addDoc(window._fbFirestore.collection(window._fbDB, "records"), r); }, onNavigateToLogin: () => setView("login"), depts, onLeaveRequest: (e) => { setPreAuthEmp(e); setView("leave_req"); }, onMissionRequest: (e) => { setPreAuthEmp(e); setView("mission_req"); }, leaves, holidays, missions }),
    view === "leave_req" && React.createElement(EmpLeaveRequest, { emps, leaves, setLeaves, onBack: () => setView("kiosk"), preAuthEmp }),
    view === "mission_req" && React.createElement(EmpMissionRequest, { emps, missions, setMissions, onBack: () => setView("kiosk"), preAuthEmp }),
    view === "login" && React.createElement(MgrLogin, { managers, onLogin: (m) => { setCurMgr(m); setView("panel"); }, onBack: () => setView("kiosk") }),
    view === "panel" && curMgr && React.createElement(MgrPanel, { mgr: curMgr, allEmps: emps, setAllEmps: setEmps, recs, setRecs, leaves, setLeaves, managers, setManagers, kioskMode, setKioskMode, depts, setDepts, holidays, setHolidays, missions, setMissions, onExit: () => setView("kiosk") })
  );
