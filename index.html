const WORK_DAYS = [0, 1, 2, 3, 4]; 
const SATURDAY = 6;

const SHIFTS = {
  "9-5": { label: "9 صباحا - 5 مساء", start: "09:00", end: "17:00", hours: 8 },
  "8-4": { label: "8 صباحا - 4 مساء", start: "08:00", end: "16:00", hours: 8 },
  "8.5-4.5": { label: "8:30 صباحا - 4:30 مساء", start: "08:30", end: "16:30", hours: 8 }
};
const DEFAULT_SHIFT = "9-5";
const LATE_GRACE = 90; 
const WORK_HOURS = 8;

function isLateForShift(time, shiftKey) {
  if (!time) return false;
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  const [sh, sm] = shift.start.split(":").map(Number);
  const [ih, im] = time.split(":").map(Number);
  const shiftStartMins = sh * 60 + sm;
  const checkInMins = ih * 60 + im;
  const earliestStart = 8 * 60; 
  const graceEnd = earliestStart + LATE_GRACE; 
  return checkInMins > Math.max(shiftStartMins + 5, graceEnd);
}

function isWorkDay(dateStr) {
  const day = new Date(dateStr).getDay();
  return WORK_DAYS.includes(day);
}

function isSaturday(dateStr) {
  return new Date(dateStr).getDay() === SATURDAY;
}

function calcOvertime(hours, dateStr, shiftKey) {
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (isSaturday(dateStr)) {
    return { regular: 0, overtime: hours, saturdayOT: hours };
  }
  if (isWorkDay(dateStr)) {
    const extra = Math.max(0, hours - shift.hours);
    return { regular: Math.min(hours, shift.hours), overtime: extra, saturdayOT: 0 };
  }
  return { regular: 0, overtime: hours, saturdayOT: 0 };
}

function diffH(s, e) {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(":").map(Number);
  const [eh, em] = e.split(":").map(Number);
  return (eh * 60 + em - (sh * 60 + sm)) / 60;
}

function haversine(la1, lo1, la2, lo2) {
  const R = 6371000;
  const dL = (la2 - la1) * Math.PI / 180;
  const dl = (lo2 - lo1) * Math.PI / 180;
  const a = Math.sin(dL / 2) * Math.sin(dL / 2) + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dl / 2) * Math.sin(dl / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

async function getDeviceFP() {
  const p = [
    navigator.userAgent,
    navigator.language,
    screen.width + "x" + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || "",
    (() => {
      try {
        const c = document.createElement("canvas"), x = c.getContext("2d");
        x.font = "14px Arial";
        x.fillStyle = "#f60";
        x.fillRect(10, 1, 40, 10);
        x.fillStyle = "#069";
        x.fillText("FP", 2, 10);
        return c.toDataURL().slice(-30);
      } catch {
        return "nc";
      }
    })()
  ].join("|");
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("").slice(0, 32);
}

function useLS(k, d) {
  const [v, set] = useState(() => {
    try {
      const s = localStorage.getItem(k);
      if (!s) return d;
      const parsed = JSON.parse(s);
      if (Array.isArray(parsed) && parsed.length === 0 && Array.isArray(d) && d.length > 0) return d;
      return parsed;
    } catch {
      return d;
    }
  });
  useEffect(() => {
    localStorage.setItem(k, JSON.stringify(v));
  }, [k, v]);
  return [v, set];
}

function SelfieWidget({ onCapture }) {
  const fileRef = useRef(null);

    if (hasSnapped.current) return true;
    const v = vR.current, c = cR.current;
    if (!v || !c || !v.videoWidth || v.videoWidth === 0) return false;
    
    hasSnapped.current = true;
    c.width = v.videoWidth;
    c.height = v.videoHeight;
    
    const ctx = c.getContext("2d");
    ctx.drawImage(v, 0, 0, c.width, c.height);
    
    const url = c.toDataURL("image/jpeg", 0.85);
    setPrev(url); 
    setSt("done");
    if (sR.current) {
      sR.current.getTracks().forEach(t => t.stop());
      sR.current = null;
    }
    onCapture(url);
    return true;

  const [mode, setMode] = useState("month");

  const filtered = mode === "month" ? recs.filter(r => r.date.startsWith(month)) : recs.filter(r => r.date === day);
  const label = mode === "month" ? `الملخص الشهري لـ ${month}` : `تقرير يوم ${day}`;

  const stats = emps.map(e => {
    const shift = e.shift || DEFAULT_SHIFT;
    const er = filtered.filter(r => r.empId === e.id);
    const uniqueDays = [...new Set(er.map(r => r.date))];

  const [curMgr, setCurMgr] = useState(null);

  useEffect(() => {
    function initFirebase() {
      if (!window._fbDB) {
        window.addEventListener("fbReady", initFirebase, { once: true });
        return;
      }
      const db = window._fbDB;
      const { collection, onSnapshot, query, orderBy } = window._fbFirestore;

      onSnapshot(collection(db, "employees"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        if (data.length > 0) setEmps(data);
      });

      onSnapshot(query(collection(db, "records"), orderBy("timestamp", "desc")), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        setRecs(data);
      });

      onSnapshot(collection(db, "managers"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        if (data.length > 0) setManagers(data);
      });

      onSnapshot(collection(db, "leaves"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        setLeaves(data);
      });

      onSnapshot(collection(db, "devices"), (snap) => {
        const obj = {};
        snap.docs.forEach(d => { obj[d.id] = d.data(); });
        setDevices(obj);
      });
    }
    initFirebase();
  }, []);
