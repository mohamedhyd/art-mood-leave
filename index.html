function geoDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const LATE_GRACE = 90; 
const WORK_HOURS = 8;
const WORK_START = "09:00";

const LATE_AFTER = 9 * 60 + 30;     // 09:30
const ABSENT_AFTER = 10 * 60 + 30;  // 10:30
const EARLY_LEAVE_BEFORE = 16 * 60; // 16:00
function toMins(t) { if (!t) return null; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function dayStatus(inTime, outTime, shiftKey) {
  if (!inTime) return "absent"; 
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return "present"; 
  const inM = toMins(inTime);
  if (inM >= ABSENT_AFTER) return "absent";          
  if (outTime && toMins(outTime) < EARLY_LEAVE_BEFORE) return "absent"; 
  if (inM >= LATE_AFTER) return "late";              
  return "present";                                  
}

function isLateForShift(time, shiftKey) {
  if (!time) return false;
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return false; 
  const [ih, im] = time.split(":").map(Number);
  const checkInMins = ih * 60 + im;
  return checkInMins > LATE_AFTER;
}

function isWorkDay(dateStr) {
  const day = new Date(dateStr).getDay();
  return WORK_DAYS.includes(day);
}

function isSaturday(dateStr) {
  return new Date(dateStr).getDay() === SATURDAY;
}

function calcOvertime(hours, dateStr, shiftKey) {
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (isSaturday(dateStr)) {
    return { regular: 0, overtime: hours, saturdayOT: hours };
  }
  if (isWorkDay(dateStr)) {
    const extra = Math.max(0, hours - (shift ? shift.hours : 8));
    return { regular: Math.min(hours, (shift ? shift.hours : 8)), overtime: extra, saturdayOT: 0 };
  }
  return { regular: 0, overtime: hours, saturdayOT: 0 };
}

async function getDeviceFP() {
  const p = [
    navigator.userAgent,
    navigator.language,
    screen.width + "x" + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || "",
    (() => {
      try {
        const c = document.createElement("canvas"), x = c.getContext("2d");
        x.font = "14px Arial";
        x.fillStyle = "#f60";
        x.fillRect(10, 1, 40, 10);
        x.fillStyle = "#069";
        x.fillText("FP", 2, 10);
        return c.toDataURL().slice(-30);
      } catch {
        return "nc";
      }
    })()
  ].join("|");
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("").slice(0, 32);
}

      const parsed = JSON.parse(s);
      if (Array.isArray(parsed) && parsed.length === 0 && Array.isArray(d) && d.length > 0) return d;
      return parsed;
    } catch {
      return d;
    }
  });
  useEffect(() => {
    localStorage.setItem(k, JSON.stringify(v));
  }, [k, v]);
  return [v, set];
}

function GpsWidget({ onResult }) {
  const [st, setSt] = useState("loading");
  const [dist, setDist] = useState(null);
  const check = useCallback(() => {
    setSt("loading");
    if (!navigator.geolocation) {
      setSt("ns");
      onResult({ ok: false, inZone: false });
      return;
    }
    const onOk = (pos) => {
      const d = geoDistance(pos.coords.latitude, pos.coords.longitude, FACTORY_LAT, FACTORY_LNG);
      const inZone = d <= GEO_RADIUS;
      setDist(Math.round(d));
      setSt(inZone ? "ok" : "out");
      onResult({ ok: true, lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: Math.round(pos.coords.accuracy), inZone: inZone, distance: Math.round(d) });
    };
    const onFail = (err) => {
      if (err && err.code === 1) { setSt("denied"); onResult({ ok: false, inZone: false }); return; }
      navigator.geolocation.getCurrentPosition(onOk, () => {
        setSt("timeout");
        onResult({ ok: false, inZone: false });
      }, { enableHighAccuracy: false, timeout: 20000, maximumAge: 60000 });
    };
    navigator.geolocation.getCurrentPosition(onOk, onFail, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
  }, [onResult]);
  useEffect(() => { check(); }, []);

  const cfg = {
    loading: { bg: T.aLight, bd: "#C7D2FE", c: T.accent, txt: "جاري تحديد الموقع..." },

  );
}

function SelfieWidget({ onCapture }) {
  const fileRef = useRef(null);
  const vR = useRef(null), cR = useRef(null), sR = useRef(null);
  const [st, setSt] = useState("idle");
  const [prev, setPrev] = useState(null);
  const [count, setCount] = useState(3);
  const hasSnapped = useRef(false);
  const rafRef = useRef(null);
  const tickRef = useRef(null);

  function stopAll() {
    if (sR.current) { sR.current.getTracks().forEach(t => t.stop()); sR.current = null; }
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
    if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; }
  }

  function brightnessOf(ctx, w, h) {
    try {
      const sw = Math.min(w, 100), sh = Math.min(h, 100);
      const d = ctx.getImageData(0, 0, sw, sh).data;
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) sum += d[i] + d[i + 1] + d[i + 2];
      return sum / (d.length / 4 * 3);
    } catch (e) { return 255; }
  }

  function doCapture(force) {
    if (hasSnapped.current) return true;
    const v = vR.current, c = cR.current;
    if (!v || !c) return false;
    let w = v.videoWidth;
    let h = v.videoHeight;
    if (!w || !h) {
      if (force) { w = 640; h = 480; } else { return false; }
    }
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    try {
      ctx.drawImage(v, 0, 0, w, h);
    } catch(e) {
      if (force) {
        ctx.fillStyle = "#6366F1";
        ctx.fillRect(0, 0, w, h);
      } else { return false; }
    }
    if (!force && brightnessOf(ctx, w, h) < 12) return false;
    hasSnapped.current = true;
    const url = c.toDataURL("image/jpeg", 0.85);
    stopAll();
    setPrev(url);
    setSt("done");
    onCapture(url);
    return true;
  }

  function start() {
    setPrev(null);
    setCount(3);
    hasSnapped.current = false;
    if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) {
      if (fileRef.current) fileRef.current.click();
      return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false })
      .then(s => {
        sR.current = s;
        const v = vR.current;
        if (!v) { setSt("live"); return; }
        v.srcObject = s;
        v.setAttribute("playsinline", "true");
        v.muted = true;
        const go = () => v.play().then(() => setSt("live")).catch(() => setSt("live"));
        if (v.readyState >= 2) go();
        else { v.oncanplay = go; v.onloadedmetadata = go; }
      })
      .catch(() => { if (fileRef.current) fileRef.current.click(); });
  }

  useEffect(() => {
    if (st !== "live") return;
    let secs = 3;
    setCount(secs);
    let done = false;

    const loop = () => {
      if (done) return;
      if (doCapture(false)) { done = true; return; }
      rafRef.current = requestAnimationFrame(loop);
    };
    const startTimer = setTimeout(() => { rafRef.current = requestAnimationFrame(loop); }, 600);

    tickRef.current = setInterval(() => {
      secs -= 1;
      setCount(secs);
      if (secs <= 0) {
        clearInterval(tickRef.current); tickRef.current = null;
        if (!done) { done = true; doCapture(true); }
      }
    }, 1000);

function Reports({ emps, recs }) {
  const filteredEmps = emps.filter(e => !e.name.includes("عبدالله") && !e.name.includes("محمد"));
  const [range, setRange] = useState("month");
  const [empFilter, setEmpFilter] = useState("all");
  const [reportDate, setReportDate] = useState(todayStr());

  const baseDate = new Date(reportDate + "T00:00:00");
  const cutoff = new Date(baseDate);
  if (range === "week") cutoff.setDate(baseDate.getDate() - 7);
  else if (range === "month") cutoff.setMonth(baseDate.getMonth() - 1);
  else if (range === "3month") cutoff.setMonth(baseDate.getMonth() - 3);
  else cutoff.setFullYear(baseDate.getFullYear() - 1);
  const cutoffStr = cutoff.toISOString().split("T")[0];

  const periodRecs = recs.filter(r => {
    if (range === "day") return r.date === reportDate;
    return r.date >= cutoffStr && r.date <= reportDate;
  });

  function empStats(id) {
    const empObj = filteredEmps.find(x => x.id === id);
    const empShift = empObj ? empObj.shift : DEFAULT_SHIFT;
    const rs = periodRecs.filter(x => x.empId === id);
    const byDate = {};
    rs.forEach(r => {
      if (!byDate[r.date]) byDate[r.date] = { in: null, out: null };
      if (r.type === "in" && !byDate[r.date].in) byDate[r.date].in = r.time;
      if (r.type === "out") byDate[r.date].out = r.time;
    });
    let present = 0, late = 0, absent = 0, early = 0, totalMins = 0, totalOvertimeMins = 0;
    Object.entries(byDate).forEach(([dateStr, d]) => {
      const s = dayStatus(d.in, d.out, empShift);
      if (s === "present") present++;
      else if (s === "late") late++;
      else if (s === "absent") absent++;
      
      const isFlex = SHIFTS[empShift]?.isFlexible;
      if (d.out && toMins(d.out) < EARLY_LEAVE_BEFORE && !isFlex) early++;
      
      if (d.in && d.out) { 
        const diff = toMins(d.out) - toMins(d.in); 
        if (diff > 0) {
          totalMins += diff; 
          const hoursDiff = diff / 60;
          const otInfo = calcOvertime(hoursDiff, dateStr, empShift);
          totalOvertimeMins += (otInfo.overtime * 60);
        }
      }
    });
    const totalHours = Math.round(totalMins / 60 * 10) / 10;
    const totalOvertime = Math.round(totalOvertimeMins / 60 * 10) / 10;
    return { totalHours, totalOvertime, days: Object.keys(byDate).length, present, late, absent, early };
  }

  const shownEmps = empFilter === "all" ? filteredEmps : filteredEmps.filter(e => e.id === empFilter);

  function exportCSV() {
    const isDay = range === "day";
    const headers = isDay 
      ? ["الموظف", "القسم", "الحالة", "ميعاد الحضور", "ميعاد الانصراف", "إجمالي الساعات", "العمل الإضافي"]
      : ["الموظف", "القسم", "أيام الحضور", "حاضر", "تأخير", "غياب", "انصراف مبكر", "إجمالي الساعات", "العمل الإضافي"];
    
    const rows = shownEmps.map(e => {
      const s = empStats(e.id);
      if (isDay) {
        const dayData = periodRecs.filter(x => x.empId === e.id);
        const specificIn = dayData.find(x => x.date === reportDate && x.type === "in")?.time || "—";
        const specificOut = dayData.find(x => x.date === reportDate && x.type === "out")?.time || "—";
        
        const empShift = e.shift || DEFAULT_SHIFT;
        const currentStatus = dayStatus(dayData.find(x => x.date === reportDate && x.type === "in")?.time, dayData.find(x => x.date === reportDate && x.type === "out")?.time, empShift);
        
        let dayStatusLabel = "غائب";
        if (currentStatus === "present") dayStatusLabel = "حاضر";
        else if (currentStatus === "late") dayStatusLabel = "متأخر";

        return [e.name, e.dept, dayStatusLabel, specificIn, specificOut, s.totalHours, s.totalOvertime];
      } else {
        return [e.name, e.dept, s.days, s.present, s.late, s.absent, s.early, s.totalHours, s.totalOvertime];
      }
    });
    const csv = "\uFEFF" + [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `تقرير_الحضور_${reportDate}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  const ranges = [
    { id: "day", l: "اليوم" },
    { id: "week", l: "أسبوع" },
    { id: "month", l: "شهر" },
    { id: "3month", l: "3 شهور" },
    { id: "year", l: "سنة" }
  ];

  return React.createElement("div", { style: { padding: "20px 0", display: "flex", flexDirection: "column", gap: 18 } },
    React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" } },

        style: { padding: "8px 14px", border: `1px solid ${T.border}`, borderRadius: 10, fontSize: 13, fontFamily: "inherit", background: T.surface, color: T.txt, marginRight: "auto" }
      },
        React.createElement("option", { value: "all" }, "كل الموظفين"),
        filteredEmps.map(e => React.createElement("option", { key: e.id, value: e.id }, e.name))
      ),
      React.createElement("button", {

        style: { padding: "8px 18px", background: T.oLight, color: T.ok, border: "1px solid #6EE7B7", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }
      }, "تصدير CSV")

    React.createElement("div", { style: { fontSize: 13, color: T.muted, fontWeight: 600 } }, "التاريخ المحدد: ", new Date(reportDate + "T00:00:00").toLocaleDateString("ar-EG", { weekday: "long", year: "numeric", month: "long", day: "numeric" })),
    React.createElement(Card, { title: "تقرير الحضور" },

          React.createElement("thead", null,
