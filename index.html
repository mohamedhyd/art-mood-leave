function geoDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const LATE_GRACE = 90; 
const WORK_HOURS = 8;
const WORK_START = "09:00";

const LATE_AFTER = 9 * 60 + 30;     // 09:30
const ABSENT_AFTER = 10 * 60 + 30;  // 10:30
const EARLY_LEAVE_BEFORE = 16 * 60; // 16:00
function toMins(t) { if (!t) return null; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function dayStatus(inTime, outTime, shiftKey) {
  if (!inTime) return "absent"; 
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return "present"; 
  const inM = toMins(inTime);
  if (inM >= ABSENT_AFTER) return "absent";          
  if (outTime && toMins(outTime) < EARLY_LEAVE_BEFORE) return "absent"; 
  if (inM >= LATE_AFTER) return "late";              
  return "present";                                  
}

function isLateForShift(time, shiftKey) {
  if (!time) return false;
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return false; 
  const [ih, im] = time.split(":").map(Number);
  const checkInMins = ih * 60 + im;
  return checkInMins > LATE_AFTER;
}

function isWorkDay(dateStr) {
  const day = new Date(dateStr).getDay();
  return WORK_DAYS.includes(day);
}

function isSaturday(dateStr) {
  return new Date(dateStr).getDay() === SATURDAY;
}

function calcOvertime(hours, dateStr, shiftKey) {
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (isSaturday(dateStr)) {
    return { regular: 0, overtime: hours, saturdayOT: hours };
  }
  if (isWorkDay(dateStr)) {
    const extra = Math.max(0, hours - (shift ? shift.hours : 8));
    return { regular: Math.min(hours, (shift ? shift.hours : 8)), overtime: extra, saturdayOT: 0 };
  }
  return { regular: 0, overtime: hours, saturdayOT: 0 };
}

async function getDeviceFP() {
  const p = [
    navigator.userAgent,
    navigator.language,
    screen.width + "x" + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || "",
    (() => {
      try {
        const c = document.createElement("canvas"), x = c.getContext("2d");
        x.font = "14px Arial";
        x.fillStyle = "#f60";
        x.fillRect(10, 1, 40, 10);
        x.fillStyle = "#069";
        x.fillText("FP", 2, 10);
        return c.toDataURL().slice(-30);
      } catch {
        return "nc";
      }
    })()
  ].join("|");
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("").slice(0, 32);
}

function GpsWidget({ onResult }) {
  const [st, setSt] = useState("loading");
  const [dist, setDist] = useState(null);

      return;
    }
    const onOk = (pos) => {
      const d = geoDistance(pos.coords.latitude, pos.coords.longitude, FACTORY_LAT, FACTORY_LNG);
      const inZone = d <= GEO_RADIUS;

      navigator.geolocation.getCurrentPosition(onOk, onFail, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    };

function SelfieWidget({ onCapture, empName }) {
  const fileRef = useRef(null);
  const videoRef = useRef(null);
  const cR = useRef(null);
  const [prev, setPrev] = useState(null);
  const [loading, setLoading] = useState(false);
  const [useStream, setUseStream] = useState(false);

  useEffect(() => {
    let activeStream = null;
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } })
        .then(s => {
          activeStream = s;
          setUseStream(true);
          setTimeout(() => {
            if (videoRef.current) videoRef.current.srcObject = s;
          }, 100);
        })
        .catch(err => {
          console.log("Webcam stream access bypassed, using native file receiver", err);
          setUseStream(false);
          if (fileRef.current) fileRef.current.click();
        });
    } else {
      setUseStream(false);
      if (fileRef.current) fileRef.current.click();
    }
    return () => {
      if (activeStream) {
        activeStream.getTracks().forEach(t => t.stop());
      }
    };
  }, []);

  function captureFromVideo() {
    const video = videoRef.current;
    const c = cR.current;
    if (!video || !c) return;

    setLoading(true);
    const ctx = c.getContext("2d");
    const width = video.videoWidth || 640;
    const height = video.videoHeight || 480;

    c.width = width; 
    c.height = height;
    
    ctx.translate(width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, width, height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(0, height - 45, width, 45);
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 13px Cairo, Arial, sans-serif";
    ctx.textAlign = "right";
    const dateStr = new Date().toLocaleString("ar-EG");
    ctx.fillText(`بصمة موثقة: ${empName || ""} | التوقيت: ${dateStr}`, width - 15, height - 16);
    
    const stampedUrl = c.toDataURL("image/jpeg", 0.85);
    setPrev(stampedUrl);
    setLoading(false);
    onCapture(stampedUrl);
    
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
    }
  }

  function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setLoading(true);
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = cR.current;
        if (!c) return;
        const ctx = c.getContext("2d");
        const MAX_WIDTH = 600;
        const MAX_HEIGHT = 600;
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
        } else {
          if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
        }

        c.width = width;

/* EMPLOYEE LIVE STATISTICS & LEAVES WIDGET */
function EmpDashboardWidget({ emp, recs, leaves, holidays = [], missions = [] }) {
  if (!emp) return null;
  const [range, setRange] = useState("month");
  const [reportDate, setReportDate] = useState(todayStr());

  const baseDate = new Date(reportDate + "T00:00:00");
  const cutoff = new Date(baseDate);
  if (range === "week") cutoff.setDate(baseDate.getDate() - 7);
  else if (range === "month") cutoff.setMonth(baseDate.getMonth() - 1);
  else if (range === "3month") cutoff.setMonth(baseDate.getMonth() - 3);
  else cutoff.setFullYear(baseDate.getFullYear() - 1);
  const cutoffStr = cutoff.toISOString().split("T")[0];

  const periodRecs = recs.filter(r => {
    if (range === "day") return r.date === reportDate;
    return r.date >= cutoffStr && r.date <= reportDate;
  });

  const myRecs = periodRecs.filter(r => r.empId === emp.id);
  const byDate = {};
  myRecs.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = { in: null, out: null };
    if (r.type === "in" && !byDate[r.date].in) byDate[r.date].in = r.time;
    if (r.type === "out") byDate[r.date].out = r.time;
  });
  
  let present = 0, late = 0, absent = 0, early = 0, totalMins = 0, totalOvertimeMins = 0;
  const empShift = emp.shift || "9-5";
  Object.entries(byDate).forEach(([dateStr, d]) => {
    const s = dayStatus(d.in, d.out, empShift);
    if (s === "present") present++;
    else if (s === "late") late++;
    else if (s === "absent") absent++;
    
    const isFlex = SHIFTS[empShift]?.isFlexible;
    if (d.out && toMins(d.out) < EARLY_LEAVE_BEFORE && !isFlex) early++;
    
    if (d.in && d.out) {
      const diff = toMins(d.out) - toMins(d.in);
      if (diff > 0) {
        totalMins += diff;
        const hoursDiff = diff / 60;
        const otInfo = calcOvertime(hoursDiff, dateStr, empShift);
        totalOvertimeMins += (otInfo.overtime * 60);
      }
    }
  });
  
  const approvedLeaves = leaves?.filter(l => l.empId === emp.id && l.date >= cutoffStr && l.date <= reportDate && l.status === "approved") || [];
  const leaveDays = approvedLeaves.length;
  const approvedMissions = missions?.filter(m => m.empId === emp.id && m.date >= cutoffStr && m.date <= reportDate && m.status === "approved") || [];
  const missionDays = approvedMissions.length;

  const totalHours = Math.round(totalMins / 60 * 10) / 10;
  const totalOvertime = Math.round(totalOvertimeMins / 60 * 10) / 10;

  let checkInTime = "—";
  let checkOutTime = "—";
  let dayStatusLabel = "غائب";
  let statusColor = T.danger;
  let statusBg = T.dLight;

  const specificIn = myRecs.find(x => x.date === reportDate && x.type === "in")?.time;
  const specificOut = myRecs.find(x => x.date === reportDate && x.type === "out")?.time;
  if (specificIn) checkInTime = specificIn;
  if (specificOut) checkOutTime = specificOut;

  const currentStatus = dayStatus(specificIn, specificOut, empShift);
  const dayLeave = leaves?.find(l => l.empId === emp.id && l.date === reportDate && l.status === "approved");
  const dayMission = missions?.find(m => m.empId === emp.id && m.date === reportDate && m.status === "approved");
  const isPubHoliday = holidays?.find(h => h.date === reportDate);
  
  if (isPubHoliday) {
    dayStatusLabel = `إجازة رسمية (${isPubHoliday.name})`; statusColor = T.warn; statusBg = T.wLight;
  } else if (dayLeave) {
    dayStatusLabel = `إجازة (${dayLeave.type})`; statusColor = T.gold; statusBg = T.gLight;
  } else if (dayMission) {

  } else if (currentStatus === "present") {

  } else if (currentStatus === "late") {
    dayStatusLabel = "متأخر"; statusColor = T.warn; statusBg = T.wLight;
  } else {
    dayStatusLabel = "غائب"; statusColor = T.danger; statusBg = T.dLight;
  }

  const ranges = [
    { id: "day", l: "اليوم" },

    { id: "month", l: "شهر" },
    { id: "3month", l: "3 شهور" }
  ];

  return React.createElement("div", {

function AttendDash({ emps, recs, leaves, depts, holidays = [], missions = [] }) {
  const today = todayStr();
  const todayR = recs.filter(r => r.date === today);
  
  function st(id) {
    const isHoliday = holidays?.some(h => h.date === today);
    if (isHoliday) return "holiday";
    const hasLeave = leaves?.some(l => l.empId === id && l.date === today && l.status === "approved");
    if (hasLeave) return "leave";
    const hasMission = missions?.some(m => m.empId === id && m.date === today && m.status === "approved");
    if (hasMission) return "mission";

    const rs = todayR.filter(x => x.empId === id);
    return rs.length ? (rs[rs.length - 1].type === "in" ? "in" : "done") : "absent";
  }
  
  function lastTime(id, type) {
    const rs = todayR.filter(x => x.empId === id && x.type === type);
    return rs.length ? rs[rs.length - 1].time : null;
  }
  
  const present = emps.filter(e => st(e.id) === "in");
  const done = emps.filter(e => st(e.id) === "done");
  const absent = emps.filter(e => st(e.id) === "absent");
  const absentLeave = emps.filter(e => st(e.id) === "leave");
  const onMission = emps.filter(e => st(e.id) === "mission");
  const onHoliday = emps.filter(e => st(e.id) === "holiday");
  const lateToday = todayR.filter(r => r.type === "in" && r.late);

  const stats = [
    { l: "في العمل الآن", v: present.length, c: T.ok, bg: T.oLight },
    { l: "أنهوا اليوم", v: done.length, c: T.accent, bg: T.aLight },
    { l: "لم يحضروا", v: absent.length, c: T.muted, bg: T.hi },

    { l: "إجازات اليوم", v: absentLeave.length + onHoliday.length, c: T.gold, bg: T.gLight }
  ];

  return React.createElement("div", { style: { padding: "20px 0", display: "flex", flexDirection: "column", gap: 18 } },

        emps.map(e => {

function Reports({ emps, recs, depts, leaves, holidays = [], missions = [] }) {
  const [range, setRange] = useState("day");
  const [empFilter, setEmpFilter] = useState("all");
  const [reportDate, setReportDate] = useState(todayStr());

  const baseDate = new Date(reportDate + "T00:00:00");
  const cutoff = new Date(baseDate);
  if (range === "week") cutoff.setDate(baseDate.getDate() - 7);
  else if (range === "month") cutoff.setMonth(baseDate.getMonth() - 1);
  else if (range === "3month") cutoff.setMonth(baseDate.getMonth() - 3);
  else cutoff.setFullYear(baseDate.getFullYear() - 1);
  const cutoffStr = cutoff.toISOString().split("T")[0];

  const periodRecs = recs.filter(r => {
    if (range === "day") return r.date === reportDate;
    return r.date >= cutoffStr && r.date <= reportDate;
  });

  function empStats(id) {
    const empObj = emps.find(x => x.id === id);
    const empShift = empObj ? empObj.shift : DEFAULT_SHIFT;
    const rs = periodRecs.filter(x => x.empId === id);
    const byDate = {};
    rs.forEach(r => {
      if (!byDate[r.date]) byDate[r.date] = { in: null, out: null };
      if (r.type === "in" && !byDate[r.date].in) byDate[r.date].in = r.time;
      if (r.type === "out") byDate[r.date].out = r.time;
    });
    let present = 0, late = 0, absent = 0, early = 0, totalMins = 0, totalOvertimeMins = 0;
    Object.entries(byDate).forEach(([dateStr, d]) => {
      const s = dayStatus(d.in, d.out, empShift);
      if (s === "present") present++;
      else if (s === "late") late++;
      else if (s === "absent") absent++;
      
      const isFlex = SHIFTS[empShift]?.isFlexible;
      if (d.out && toMins(d.out) < EARLY_LEAVE_BEFORE && !isFlex) early++;
      
      if (d.in && d.out) { 
        const diff = toMins(d.out) - toMins(d.in); 
        if (diff > 0) {
          totalMins += diff; 
          const hoursDiff = diff / 60;
          const otInfo = calcOvertime(hoursDiff, dateStr, empShift);
          totalOvertimeMins += (otInfo.overtime * 60);
        }
      }
    });

    const approvedLeaves = leaves?.filter(l => l.empId === id && l.date >= cutoffStr && l.date <= reportDate && l.status === "approved") || [];
    const leaveDays = approvedLeaves.length;
    const approvedMissions = missions?.filter(m => m.empId === id && m.date >= cutoffStr && m.date <= reportDate && m.status === "approved") || [];
    const missionDays = approvedMissions.length;

    const totalHours = Math.round(totalMins / 60 * 10) / 10;
    const totalOvertime = Math.round(totalOvertimeMins / 60 * 10) / 10;
    return { totalHours, totalOvertime, days: Object.keys(byDate).length, present, late, absent, early, leaveDays, missionDays };
  }

  const shownEmps = empFilter === "all" ? emps : emps.filter(e => e.id === empFilter);

  function exportCSV() {
    const isDay = range === "day";
    const headers = isDay 
      ? ["الموظف", "القسم", "الحالة", "ميعاد الحضور", "ميعاد الانصراف", "إجمالي الساعات", "العمل الإضافي"]
      : ["الموظف", "القسم", "أيام الحضور", "حاضر", "تأخير", "غياب", "إجازات خاصة", "مأموريات خارجية", "انصراف مبكر", "إجمالي الساعات", "العمل الإضافي"];
    
    const rows = shownEmps.map(e => {
      const s = empStats(e.id);
      if (isDay) {
        const dayData = periodRecs.filter(x => x.empId === e.id);
        const specificIn = dayData.find(x => x.date === reportDate && x.type === "in")?.time || "—";
        const specificOut = dayData.find(x => x.date === reportDate && x.type === "out")?.time || "—";
        
        const empShift = e.shift || DEFAULT_SHIFT;
        const currentStatus = dayStatus(dayData.find(x => x.date === reportDate && x.type === "in")?.time, dayData.find(x => x.date === reportDate && x.type === "out")?.time, empShift);
        
        const dayLeave = leaves?.find(l => l.empId === e.id && l.date === reportDate && l.status === "approved");
        const dayMission = missions?.find(m => m.empId === e.id && m.date === reportDate && m.status === "approved");
        const isPubHoliday = holidays?.find(h => h.date === reportDate);
        
        let dayStatusLabel = "غائب";
        if (isPubHoliday) dayStatusLabel = `إجازة رسمية (${isPubHoliday.name})`;
        else if (dayLeave) dayStatusLabel = `إجازة (${dayLeave.type})`;
        else if (dayMission) dayStatusLabel = `مأمورية (${dayMission.destination})`;
        else if (currentStatus === "present") dayStatusLabel = "حاضر";
        else if (currentStatus === "late") dayStatusLabel = "متأخر";

        return [e.name, e.dept, dayStatusLabel, specificIn, specificOut, s.totalHours, s.totalOvertime];
      } else {
        return [e.name, e.dept, s.days, s.present, s.late, s.absent, s.leaveDays, s.missionDays, s.early, s.totalHours, s.totalOvertime];
      }
    });
    const csv = "\uFEFF" + [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `تقرير_حسابات_العمل_${reportDate}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);

    if (!form.name.trim() || form.pin.length < 4) {

      return;
    }

      return;

    if (pinExists) {
      setErr("رمز الـ PIN هذا مسجل مسبقاً لمخدم آخر، يرجى اختيار رمز فريد.");
      return;

      setDoc(doc(window._fbDB, "managers", id), newMgr);

    setAdding(false);

function EmpsMgmt({ emps, setEmps, managers, depts }) {
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name: "", dept: "", pin: "", color: "#6366F1", shift: DEFAULT_SHIFT });
  const [err, setErr] = useState("");
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({ dept: "", pin: "", shift: DEFAULT_SHIFT });
  const [draggedIdx, setDraggedIdx] = useState(null);

  function add() {
    if (!form.name.trim() || form.pin.length < 4 || !form.dept.trim()) {
      setErr("يرجى التأكد من كتابة الاسم، اختيار القسم، وتعيين PIN صالح لا يقل عن 4 أرقام");
      return;
    }

    const pinExists = emps.some(x => x.pin === form.pin.trim()) || managers.some(x => x.pin === form.pin.trim());
    if (pinExists) {
      setErr("رمز الـ PIN هذا مسجل مسبقاً لمستخدم آخر، يرجى اختيار رمز فريد.");
      return;
    }

    const id = "E" + String(Date.now()).slice(-5);
    const newEmp = { id, ...form, name: form.name.trim(), pin: form.pin.trim(), order: emps.length };
    setEmps(p => [...p, newEmp]);
    if (window._fbDB) {
      const { setDoc, doc } = window._fbFirestore;
      setDoc(doc(window._fbDB, "employees", id), newEmp);
    }
    setForm({ name: "", dept: "", pin: "", color: COLORS[Math.floor(Math.random() * COLORS.length)], shift: DEFAULT_SHIFT });
    setAdding(false);
    setErr("");
  }

  function del(id) {
    if (!confirm("هل أنت متأكد من حذف هذا الموظف؟")) return;
    setEmps(p => p.filter(e => e.id !== id));
    if (window._fbDB) {
      const { deleteDoc, doc } = window._fbFirestore;
      deleteDoc(doc(window._fbDB, "employees", id));
    }
  }

  function startEdit(e) {
    setEditId(e.id);
    setEditForm({ dept: e.dept, pin: e.pin, shift: e.shift || DEFAULT_SHIFT });
  }

  function saveEdit(id) {
    if (!editForm.dept.trim() || editForm.pin.length < 4) {
      alert("القسم مطلوب والـ PIN لا يقل عن 4 أرقام");
      return;
    }

    const pinExists = emps.some(x => x.id !== id && x.pin === editForm.pin.trim()) || managers.some(x => x.pin === editForm.pin.trim());
    if (pinExists) {
      alert("رمز الـ PIN هذا مسجل مسبقاً لمستخدم آخر، يرجى اختيار رمز فريد.");
      return;
    }

    setEmps(p => p.map(e => e.id === id ? { ...e, dept: editForm.dept.trim(), pin: editForm.pin.trim(), shift: editForm.shift } : e));
    if (window._fbDB) {
      const { updateDoc, doc } = window._fbFirestore;
      updateDoc(doc(window._fbDB, "employees", id), { dept: editForm.dept.trim(), pin: editForm.pin.trim(), shift: editForm.shift });
    }

  }

    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
      React.createElement("h3", null, "قائمة الموظفين"),
      React.createElement("button", { onClick: () => setAdding(!adding), style: { padding: "10px 20px", background: T.accent, color: "#fff", fontWeight: 700 } }, adding ? "إلغاء" : "إضافة موظف")
    ),
    adding && React.createElement("div", { className: "fade", style: { background: T.surface, border: `1.5px solid ${T.accent}`, borderRadius: 18, padding: 22 } },
      React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(170px,1fr))", gap: 12, marginBottom: 14 } },
        React.createElement("input", { placeholder: "اسم الموظف الثلاثي *", value: form.name, onChange: e => setForm({ ...form, name: e.target.value }) }),
        React.createElement("select", { value: form.dept, onChange: e => setForm({ ...form, dept: e.target.value }) },
          React.createElement("option", { value: "" }, "اختر القسم التابع له *"),
          depts.map(d => React.createElement("option", { key: d.name, value: d.name }, d.name))
        ),
        React.createElement("input", { placeholder: "رمز الدخول PIN المخصص *", maxLength: 6, value: form.pin, onChange: e => setForm({ ...form, pin: e.target.value.replace(/\D/g, "") }) }),
        React.createElement("select", { value: form.shift, onChange: e => setForm({ ...form, shift: e.target.value }) },
          Object.entries(SHIFTS).map(([k, s]) => React.createElement("option", { key: k, value: k }, s.label))
        )
      ),
      err && React.createElement(Note, { color: T.danger, bg: T.dLight }, err),
      React.createElement("button", { onClick: add, style: { padding: "11px 28px", background: T.accent, color: "#fff", fontWeight: 700 } }, "إضافة الموظف")

    },
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 } },
        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
          React.createElement(Av, { e: e, sz: 38, color: getDeptColor(e.dept, depts) }),
          React.createElement("div", null,
            React.createElement("div", { style: { fontWeight: 600 } }, `${idx + 1}. ${e.name}`),

            )

        React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
          React.createElement("button", { onClick: () => editId === e.id ? setEditId(null) : startEdit(e), style: { padding: "6px 14px", background: T.aLight, color: T.accent, borderRadius: 10, fontSize: 12, fontWeight: 600 } }, editId === e.id ? "إغلاق" : "تعديل / نقل"),
          React.createElement("button", { onClick: () => del(e.id), style: { padding: "6px 14px", background: T.dLight, color: T.danger, borderRadius: 10, fontSize: 12, fontWeight: 600 } }, "حذف")
        )
      ),

        React.createElement("div", { style: { flex: 1, minWidth: 140 } },
          React.createElement("label", { style: { fontSize: 11, color: T.muted, display: "block", marginBottom: 4 } }, "نقل لقسم آخر"),
          React.createElement("select", { value: editForm.dept, onChange: ev => setEditForm({ ...editForm, dept: ev.target.value }), style: { width: "100%" } },

          React.createElement("label", { style: { fontSize: 11, color: T.muted, display: "block", marginBottom: 4 } }, "تغيير الشيفت المعتمد"),
          React.createElement("select", { value: editForm.shift, onChange: ev => setEditForm({ ...editForm, shift: ev.target.value }), style: { width: "100%" } },
            Object.entries(SHIFTS).map(([k, s]) => React.createElement("option", { key: k, value: k }, s.label))
          )

        React.createElement("div", { style: { flex: 1, minWidth: 140 } },
          React.createElement("label", { style: { fontSize: 11, color: T.muted, display: "block", marginBottom: 4 } }, "تغيير الرقم السري PIN"),
          React.createElement("input", { placeholder: "PIN جديد", maxLength: 6, value: editForm.pin, onChange: ev => setEditForm({ ...editForm, pin: ev.target.value.replace(/\D/g, "") }), style: { width: "100%" } })
        ),

      )
    ))
  );
}

/* ROOT APP APPLICATION */
function App() {
  const [emps, setEmps] = useLS("a9_emps", []);
  const [recs, setRecs] = useLS("a9_recs", []);
  const [leaves, setLeaves] = useLS("a9_leaves", []);
  const [holidays, setHolidays] = useLS("a9_holidays", []);
  const [missions, setMissions] = useLS("a9_missions", []);
  const [devices, setDevices] = useLS("a9_devs", {});
  const [managers, setManagers] = useLS("a9_mgrs", DEF_MGRS);
  const [kioskMode, setKioskMode] = useLS("a9_kioskmode", "personal");
  const [depts, setDepts] = useLS("a9_depts", [
    { name: "الإدارة", color: "#6366F1" },
    { name: "المبيعات", color: "#EC4899" },
    { name: "الحسابات", color: "#F59E0B" },
    { name: "الإنتاج", color: "#10B981" }
  ]);
  const [view, setView] = useState("kiosk");
  const [curMgr, setCurMgr] = useState(null);
  const [preAuthEmp, setPreAuthEmp] = useState(null);

  useEffect(() => {
    function initFirebase() {
      if (!window._fbDB) {
        window.addEventListener("fbReady", initFirebase, { once: true });
        return;
      }
      const db = window._fbDB;
      const { collection, onSnapshot, query, orderBy } = window._fbFirestore;

      onSnapshot(window._fbFirestore.doc(db, "system_settings", "depts_config"), (docSnap) => {
        if (docSnap.exists() && docSnap.data().list) {
          setDepts(docSnap.data().list);
        }
      });

      onSnapshot(collection(db, "employees"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        data.sort((a, b) => (a.order || 0) - (b.order || 0));
        if (data.length > 0) setEmps(data);
      });

      onSnapshot(query(collection(db, "records"), orderBy("timestamp", "asc")), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        if (data.length > 0) setRecs(data);
      });

      onSnapshot(collection(db, "managers"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        data.sort((a, b) => (a.order || 0) - (b.order || 0));
        if (data.length > 0) setManagers(data);
      });

      onSnapshot(collection(db, "leaves"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        if (data.length > 0) setLeaves(data);
      });

      onSnapshot(collection(db, "holidays"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        if (data.length > 0) setHolidays(data);
      });

      onSnapshot(collection(db, "missions"), (snap) => {
        const data = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        if (data.length > 0) setMissions(data);
      });
    }
    initFirebase();
  }, []);

  const handleKioskLeaveRequest = (employee) => {
    setPreAuthEmp(employee);
    setView("emp_leave");
  };

  const handleKioskMissionRequest = (employee) => {
    setPreAuthEmp(employee);
    setView("emp_mission");
  };

  return React.createElement(React.Fragment, null,
    React.createElement("style", null, CSS),
    view === "kiosk" && kioskMode === "personal" && React.createElement(Kiosk, { 
      emps, 
      managers, 
      recs, 
      onRec: (r) => { 
        setRecs(rs => [...rs, r]); 
        if (window._fbDB) { 
          const { addDoc, collection } = window._fbFirestore; 
          addDoc(collection(window._fbDB, "records"), { ...r, timestamp: new Date().toISOString() }); 
        } 
      }, 
      onNavigateToLogin: () => setView("login"), 
      depts, 
      onLeaveRequest: handleKioskLeaveRequest,
      onMissionRequest: handleKioskMissionRequest,
      leaves,
      holidays,
      missions
    }),
    view === "kiosk" && kioskMode === "tablet" && React.createElement(KioskTablet, { 
      emps, 
      managers, 
      recs, 
      onRec: (r) => { 
        setRecs(rs => [...rs, r]); 
        if (window._fbDB) { 
          const { addDoc, collection } = window._fbFirestore; 
          addDoc(collection(window._fbDB, "records"), { ...r, timestamp: new Date().toISOString() }); 
        } 
      }, 
      onNavigateToLogin: () => setView("login"), 
      depts, 
      onLeaveRequest: handleKioskLeaveRequest, 
      onMissionRequest: handleKioskMissionRequest,
      leaves,
      holidays,
      missions
    }),
    view === "emp_leave" && React.createElement(EmpLeaveRequest, { emps, leaves, setLeaves, onBack: () => { setPreAuthEmp(null); setView("kiosk"); }, preAuthEmp }),
    view === "emp_mission" && React.createElement(EmpMissionRequest, { emps, missions, setMissions, onBack: () => { setPreAuthEmp(null); setView("kiosk"); }, preAuthEmp }),
    view === "login" && React.createElement(MgrLogin, { managers, onLogin: (m) => { setCurMgr(m); setView("panel"); }, onBack: () => setView("kiosk") }),
    view === "panel" && curMgr && React.createElement(MgrPanel, { mgr: curMgr, allEmps: emps, setAllEmps: setEmps, recs, setRecs, leaves, setLeaves, managers, setManagers, kioskMode, setKioskMode, depts, setDepts, holidays, setHolidays, missions, setMissions, onExit: () => { setCurMgr(null); setView("kiosk"); } })
  );
}
