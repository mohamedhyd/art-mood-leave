function geoDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
const LATE_GRACE = 90; 
const WORK_HOURS = 8;
const WORK_START = "09:00";

const LATE_AFTER = 9 * 60 + 30;     // 09:30
const ABSENT_AFTER = 10 * 60 + 30;  // 10:30
const EARLY_LEAVE_BEFORE = 16 * 60; // 16:00
function toMins(t) { if (!t) return null; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function dayStatus(inTime, outTime, shiftKey) {
  if (!inTime) return "absent"; 
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return "present"; 
  const inM = toMins(inTime);
  if (inM >= ABSENT_AFTER) return "absent";          
  if (outTime && toMins(outTime) < EARLY_LEAVE_BEFORE) return "absent"; 
  if (inM >= LATE_AFTER) return "late";              
  return "present";                                  
}

function isLateForShift(time, shiftKey) {
  if (!time) return false;
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (shift && shift.isFlexible) return false; 
  const [ih, im] = time.split(":").map(Number);
  const checkInMins = ih * 60 + im;
  return checkInMins > LATE_AFTER;
}

function isWorkDay(dateStr) {
  const day = new Date(dateStr).getDay();
  return WORK_DAYS.includes(day);
}

function isSaturday(dateStr) {
  return new Date(dateStr).getDay() === SATURDAY;
}

function calcOvertime(hours, dateStr, shiftKey) {
  const shift = SHIFTS[shiftKey || DEFAULT_SHIFT];
  if (isSaturday(dateStr)) {
    return { regular: 0, overtime: hours, saturdayOT: hours };
  }
  if (isWorkDay(dateStr)) {
    const extra = Math.max(0, hours - (shift ? shift.hours : 8));
    return { regular: Math.min(hours, (shift ? shift.hours : 8)), overtime: extra, saturdayOT: 0 };
  }
  return { regular: 0, overtime: hours, saturdayOT: 0 };
}

async function getDeviceFP() {
  const p = [
    navigator.userAgent,
    navigator.language,
    screen.width + "x" + screen.height,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || "",
    (() => {
      try {
        const c = document.createElement("canvas"), x = c.getContext("2d");
        x.font = "14px Arial";
        x.fillStyle = "#f60";
        x.fillRect(10, 1, 40, 10);
        x.fillStyle = "#069";
        x.fillText("FP", 2, 10);
        return c.toDataURL().slice(-30);
      } catch {
        return "nc";
      }
    })()
  ].join("|");
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("").slice(0, 32);
}

function AttendDash({ emps, recs, leaves, isSuper, depts }) {
  const filteredEmps = emps.filter(e => !e.name.includes("عبدالله") && !e.name.includes("محمد"));
  const today = todayStr(); const todayR = recs.filter(r => r.date === today);
  function st(id) {
    if (leaves?.some(l => l.empId === id && l.date === today && l.status === "approved")) return "leave";
    const rs = todayR.filter(x => x.empId === id); return rs.length ? (rs[rs.length - 1].type === "in" ? "in" : "done") : "absent";
  }
  const present = filteredEmps.filter(e => st(e.id) === "in"); const done = filteredEmps.filter(e => st(e.id) === "done");
  const absent = filteredEmps.filter(e => st(e.id) === "absent"); const absentLeave = filteredEmps.filter(e => st(e.id) === "leave");

      [ { l: "في العمل", v: present.length, c: T.ok, bg: T.oLight }, { l: "انصرفوا", v: done.length, c: T.accent, bg: T.aLight }, { l: "غائبين", v: absent.length, c: T.muted, bg: T.hi }, { l: "إجازة معتمدة", v: absentLeave.length, c: T.gold, bg: T.gLight } ].map((x, i) => React.createElement("div", { key: i, style: { background: x.bg, padding: 14, borderRadius: 14 } }, React.createElement("div", { style: { fontSize: 24, fontWeight: 800, color: x.c } }, x.v), React.createElement("div", { style: { fontSize: 12, color: T.mid } }, x.l)))
    ),
    React.createElement(Card, { title: "مراقبة الحضور والتحركات الفورية" },
      filteredEmps.map(e => {
        const sStatus = st(e.id);
        const mapS = { in: { l: "في العمل", c: T.ok, bg: T.oLight }, done: { l: "انصرف", c: T.accent, bg: T.aLight }, absent: { l: "غائب", c: T.muted, bg: T.hi }, leave: { l: "إجازة رسمية", c: T.gold, bg: T.gLight } };
        const curS = mapS[sStatus] || mapS.absent;
        const dColor = e._isMgr ? (e.role === 'super' ? T.gold : getDeptColor(e.depts?.[0], depts)) : getDeptColor(e.dept, depts);
        return React.createElement("div", { key: e.id, style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${T.border}` } },
          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
            React.createElement(Av, { e: e, sz: 36, color: dColor }),
            React.createElement("div", null, React.createElement("div", { style: { fontSize: 14, fontWeight: 600 } }, e.name), React.createElement("span", { style: { fontSize: 10, color: dColor, fontWeight: 700 } }, e.dept))
          ),
          React.createElement(Badge, { label: curS.l, color: curS.c, bg: curS.bg })
        );
      })
    )
  );
}

/* MAIN APP ROUTER */
function App() {
  const [emps, setEmps] = useLS("a9_emps", []); const [recs, setRecs] = useLS("a9_recs", []);
  const [leaves, setLeaves] = useLS("a9_leaves", []); const [devices, setDevices] = useLS("a9_devs", {});
  const [managers, setManagers] = useLS("a9_mgrs", DEF_MGRS); const [kioskMode, setKioskMode] = useLS("a9_kioskmode", "personal");
  const [depts, setDepts] = useLS("a9_depts", [{ name: "الإدارة", color: "#6366F1" }, { name: "المبيعات", color: "#EC4899" }, { name: "الحسابات", color: "#F59E0B" }, { name: "الإنتاج", color: "#10B981" }]);
  const [view, setView] = useState("kiosk"); const [curMgr, setCurMgr] = useState(null); const [preAuthEmp, setPreAuthEmp] = useState(null);

  useEffect(() => {
    window._globalLeaves = leaves; window._globalSetLeaves = setLeaves; window._globalRecs = recs;
  }, [leaves, recs]);

  useEffect(() => {
    function initFirebase() {
      if (!window._fbDB) {
        window.addEventListener("fbReady", initFirebase, { once: true });
        return;
      }
      const db = window._fbDB;
      const fs = window._fbFirestore;

      fs.onSnapshot(fs.collection(db, "employees"), s => {
        const data = s.docs.map(d => ({id: d.id, ...d.data()}));
        try {
          const savedOrder = JSON.parse(localStorage.getItem("a9_emps_order") || "[]");
          if (savedOrder.length > 0) {
            data.sort((a, b) => {
              let idxA = savedOrder.indexOf(a.id); let idxB = savedOrder.indexOf(b.id);
              if (idxA === -1) idxA = 99999; if (idxB === -1) idxB = 99999;
              return idxA - idxB;
            });
          }
        } catch(e){}
        setEmps(data);
      });

      fs.onSnapshot(fs.query(fs.collection(db, "records"), fs.orderBy("timestamp", "asc")), s => setRecs(s.docs.map(d => ({id: d.id, ...d.data()}))));
      
      fs.onSnapshot(fs.collection(db, "managers"), s => {
        const data = s.docs.map(d => ({id: d.id, ...d.data()}));
        try {
          const savedOrder = JSON.parse(localStorage.getItem("a9_mgrs_order") || "[]");
          if (savedOrder.length > 0) {
            data.sort((a, b) => {
              let idxA = savedOrder.indexOf(a.id); let idxB = savedOrder.indexOf(b.id);
              if (idxA === -1) idxA = 99999; if (idxB === -1) idxB = 99999;
              return idxA - idxB;
            });
          }
        } catch(e){}
        setManagers(data);
      });

      fs.onSnapshot(fs.collection(db, "leaves"), s => setLeaves(s.docs.map(d => ({id: d.id, ...d.data()}))));
      fs.onSnapshot(fs.collection(db, "devices"), s => { const o={}; s.docs.forEach(d => o[d.id]=d.data()); setDevices(o); });
    }
    initFirebase();
  }, []);

  return React.createElement(React.Fragment, null,
    React.createElement("style", null, CSS),
    view === "kiosk" && React.createElement(React.Fragment, null,
      React.createElement(KioskWrapper, { emps, managers, recs, onRec: (r) => { setRecs(p=>[...p, r]); if(window._fbDB) window._fbFirestore.addDoc(window._fbFirestore.collection(window._fbDB, "records"), {...r, timestamp: new Date().toISOString()}) }, devices, depts, kioskMode, onLeaveRequest: (e) => { setPreAuthEmp(e); setView("emp_leave"); } }),
      React.createElement("div", { style: { position: "fixed", bottom: 15, left: "50%", transform: "translateX(-50%)", zIndex: 200, display: "flex", gap: 8 } },
        React.createElement("button", { onClick: () => setView("login"), style: { padding: "8px 18px", background: T.surface, border: `1.5px solid ${T.border}`, borderRadius: 12, fontWeight: 700 } }, "دخول المديرين")
      )
    ),
    view === "emp_leave" && React.createElement(EmpLeaveRequest, { emps, leaves, setLeaves, onBack: () => { setPreAuthEmp(null); setView("kiosk"); }, preAuthEmp }),
    view === "login" && React.createElement(MgrLogin, { managers, onLogin: m => { setCurMgr(m); setView("panel") }, onBack: () => setView("kiosk") }),
    view === "panel" && curMgr && React.createElement(MgrPanel, { mgr: curMgr, allEmps: emps, setAllEmps: setEmps, recs, setRecs, leaves, setLeaves, devices, setDevices, managers, setManagers, kioskMode, setKioskMode, depts, setDepts, onExit: () => { setCurMgr(null); setView("kiosk") } })
  );
}
